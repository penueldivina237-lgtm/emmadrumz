<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Videos | Divine Emmanuel</title>
  <style>
    body { background:#070707; color:#eee; font-family: Georgia, 'Times New Roman', serif; }
    .container { width:90%; max-width:1100px; margin:36px auto; }
    header { margin-bottom:18px; }
    a.back { color:#d4af37; text-decoration:none; display:inline-block; margin-bottom:12px; }
    .player { background:#0b0b0b; border:1px solid rgba(255,255,255,0.04); padding:18px; border-radius:10px; }
    .player iframe, .player video { width:100%; height:62vh; border:0; border-radius:8px; }
    .fallback { margin-top:14px; color:#cfcfcf; }
    .video-list { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin-top:16px; }
    .video-card { background:#0f0f0f; padding:12px; border-radius:8px; border:1px solid rgba(255,255,255,0.03); }
    .video-card a { color:#fff; text-decoration:none; }
  </style>
  <meta name="description" content="Watch performance videos by Divine Emmanuel — professional drummer based in Hamilton, ON.">
  <meta property="og:title" content="Videos | Divine Emmanuel">
  <meta property="og:description" content="Watch performance videos and highlights.">
  <meta property="og:image" content="image1.jpeg">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body>
  <a class="skip-link" href="#playerArea">Skip to main content</a>
  <div class="container">
    <header>
      <a class="back" href="index.html">← Back to Home</a>
      <h1>Video Player</h1>
      <p class="fallback">Click a gallery image to open a video. Replace placeholders with your actual video IDs or files.</p>
    </header>

    <div id="playerArea" class="player" aria-live="polite">
      <!-- Player will be injected here -->
    </div>

    <div id="videoList" class="video-list" style="display:none;">
      <!-- Fallback list of videos -->
    </div>
  </div>

  <script>
    // Map hash keys to video sources. Replace with real YouTube IDs or local file paths.
    const videos = {
      video1: { type: 'youtube', src: 'https://www.youtube.com/embed/VIDEO_ID_1' },
      video2: { type: 'youtube', src: 'https://www.youtube.com/embed/VIDEO_ID_2' },
      video3: { type: 'youtube', src: 'https://www.youtube.com/embed/VIDEO_ID_3' },
      video4: { type: 'youtube', src: 'https://www.youtube.com/embed/VIDEO_ID_4' },
      video5: { type: 'youtube', src: 'https://www.youtube.com/embed/VIDEO_ID_5' },
      video6: { type: 'youtube', src: 'https://www.youtube.com/embed/VIDEO_ID_6' }
    };

    function showFallbackList() {
      const list = document.getElementById('videoList');
      list.style.display = '';
      list.innerHTML = Object.keys(videos).map(key => {
        return `<div class="video-card"><a href="video.html#${key}">${key}</a></div>`;
      }).join('');
    }

    function loadVideo(key) {
      const player = document.getElementById('playerArea');
      player.innerHTML = '';
      const v = videos[key];
      if (!v) { player.innerHTML = '<p>No video found for that id.</p>'; showFallbackList(); return; }

      if (v.type === 'youtube') {
        const iframe = document.createElement('iframe');
        iframe.src = v.src + '?rel=0&autoplay=1';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        iframe.allowFullscreen = true;
        player.appendChild(iframe);
      } else if (v.type === 'mp4') {
        const vid = document.createElement('video');
        vid.src = v.src;
        vid.controls = true;
        vid.autoplay = true;
        player.appendChild(vid);
      }
    }

    // Choose video from hash (#video1) or query param (?v=video1)
    const hashKey = (location.hash || '').replace('#','');
    const params = new URLSearchParams(location.search);
    const qKey = params.get('v');
    const key = hashKey || qKey;

    if (key) {
      loadVideo(key);
    } else {
      document.getElementById('playerArea').innerHTML = '<p>Select a video from the gallery or choose one below.</p>';
      showFallbackList();
    }
  </script>
  <!-- Cookie consent + analytics loader -->
  <div id="cookieConsent" class="cookie-consent" aria-live="polite" style="display:none;">
    <div class="cookie-text">We use analytics to improve the site. Accept tracking?</div>
    <div class="cookie-actions">
      <button id="acceptAnalytics" class="btn">Accept</button>
      <button id="declineAnalytics" class="btn">Decline</button>
    </div>
  </div>
  <style>
    .cookie-consent { position:fixed; right:12px; bottom:12px; background:#111; color:#fff; padding:12px 14px; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,0.4); z-index:3000; display:flex; gap:10px; align-items:center; }
    .cookie-text { margin-right:8px; }
    .skip-link{position:absolute;left:8px;top:8px;background:#111;color:#fff;padding:8px 12px;border-radius:6px;z-index:1500;transform:translateY(-120%);transition:transform .18s}
    .skip-link:focus{transform:translateY(0);}
  </style>
  <script>
    (function(){
      function loadAnalytics() {
        if (window._analyticsLoaded) return;
        window._analyticsLoaded = true;
        const id = 'G-XXXXXXXXXX';
        const s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
        s.async = true; document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);} window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', id, { anonymize_ip: true });
      }

      const consent = localStorage.getItem('analyticsConsent');
      const banner = document.getElementById('cookieConsent');
      if (consent === 'granted') { loadAnalytics(); }
      else if (consent === 'declined') { /* do nothing */ }
      else { banner.style.display = 'flex'; }

      document.getElementById('acceptAnalytics')?.addEventListener('click', function(){
        localStorage.setItem('analyticsConsent','granted'); loadAnalytics(); banner.style.display = 'none';
      });

      document.getElementById('declineAnalytics')?.addEventListener('click', function(){
        localStorage.setItem('analyticsConsent','declined'); banner.style.display = 'none';
      });
    })();
  </script>
</body>
</html>
